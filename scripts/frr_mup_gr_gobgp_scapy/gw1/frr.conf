hostname gw1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp graceful-restart
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:f::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 ! Graceful Restart (RFC 4724) toggled at runtime by the harness via
 ! `[no] bgp graceful-restart`.  preserve-fw-state ensures the kernel
 ! keeps installed seg6local entries while the BGP session is down,
 ! which is exactly what sub-test A asserts.
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart restart-time 120
 neighbor 2001:db8:1::2 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
router bgp 65002 vrf vrf-red
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  redistribute connected
  rd 200:200
  rt export 10:10
  sid auto
  segment interwork
  rt import 20:20
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
