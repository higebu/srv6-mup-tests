hostname pe1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp graceful-restart
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:e::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 ! Graceful Restart (RFC 4724) toggled at runtime by the harness via
 ! `[no] bgp graceful-restart` so sub-tests A/B (GR on) and C (GR off)
 ! share the same starting config.  Default here is "on".
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart restart-time 120
 neighbor 2001:db8:1::1 remote-as 65002
 neighbor 2001:db8:0::2 remote-as 65000
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::1 activate
  neighbor 2001:db8:1::1 route-map MUP_PERMIT in
  neighbor 2001:db8:1::1 route-map MUP_PERMIT out
  neighbor 2001:db8:0::2 activate
  neighbor 2001:db8:0::2 route-map MUP_PERMIT in
  neighbor 2001:db8:0::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
router bgp 65001 vrf vrf-red
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  rt import 10:10
  rd 100:100
  rt export 20:20
  sid auto
  segment direct
   address 10.0.0.250
   behavior dt4
   segment-id 10:10
  exit
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
