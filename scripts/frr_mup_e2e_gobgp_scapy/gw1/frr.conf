hostname gw1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:f::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for vrf-red — drives ISD origination from the
! per-vrf unicast RIB via `rd|rt|sid mup export` (sibling of L3VPN's
! `rd|rt|sid vpn export` model).  T1ST received over the default-vrf
! MUP session above resolves against this ISD and installs into
! vrf-red's table.
router bgp 65002 vrf vrf-red
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 unicast
  ! Pick up 10.99.0.0/24 (veth-gw-gnb in vrf-red) into the unicast
  ! RIB; the `mup export` directives below leak it to BGP-MUP as ISD.
  redistribute connected
  ! gw1 originates ISD on the DL-direction RT so only pe1 imports it.
  rd mup export 200:200
  rt mup export 10:10
  sid mup export auto
 exit-address-family
 !
 address-family ipv4 mup
  ! gw1 imports the UL-direction RT (carried on DSD from pe1 and on
  ! T2ST from the MUP-Controller).  T2ST resolves against the cached
  ! DSD and installs an H.Encaps toward pe1's End.DT4 SID.
  route-target import 20:20
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
