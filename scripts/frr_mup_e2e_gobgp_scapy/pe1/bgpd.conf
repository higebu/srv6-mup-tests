hostname pe1
log file /tmp/pe1/frr.log
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 2001:db8:1::1 remote-as 65002
 neighbor 2001:db8:0::2 remote-as 65000
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::1 activate
  neighbor 2001:db8:0::2 activate
  ! `vrf vrf-red` is resolved lazily — bgpd accepts this even if
  ! vrf-red is not yet known to zebra and replays the SID install
  ! when the VRF appears (bgp_mup_handle_vrf_update in bgp_mup.c).
  segment direct 10.0.0.250 rd 100:100 rt 10:10 mup 10:10 behavior End_DT4 vrf vrf-red
 exit-address-family
exit
