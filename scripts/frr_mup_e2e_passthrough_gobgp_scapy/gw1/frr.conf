hostname gw1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:f::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for vrf-red.  This test asserts the contract
! that ipv4 unicast and ipv4 mup can coexist in the same vrf — the
! reason vrf-red needs ipv4 unicast is that non-T-PDU GTP-U traffic
! (Echo Request, Error Indication, ...) is passed through by the
! kernel seg6local action and must follow plain IPv4 forwarding.
router bgp 65002 vrf vrf-red
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 unicast
  ! Pick up the lupf leg (10.20.0.0/24 on veth-gw-lupf) so the
  ! per-vrf RIB carries it.  The connected route is what non-T-PDU
  ! GTP-U follows when ip_forward in vrf-red picks the egress.
  redistribute connected
 exit-address-family
 !
 address-family ipv4 mup
  redistribute connected
  rd 200:200
  rt export 10:10
  sid auto
  segment interwork
  rt import 20:20
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
