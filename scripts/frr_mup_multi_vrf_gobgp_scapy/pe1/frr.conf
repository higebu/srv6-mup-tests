hostname pe1
log file /tmp/pe1/frr.log
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
no zebra nexthop kernel enable
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:1c::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
! pe1 is the transit BGP-MUP speaker.  It peers with the gobgpd
! injector (gbgp) and re-advertises every BGP-MUP route to pe2.  No
! per-vrf instance is configured here because the multi-vrf split is
! exercised on pe2 — pe1's only job is to deliver the four
! T1ST/T2ST sets (A/B/C/D) plus their ISD/DSD anchors to pe2 with
! their RT extcomms intact.
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65000
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
