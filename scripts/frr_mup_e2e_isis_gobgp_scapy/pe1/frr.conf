hostname pe1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
debug isis adj-packets
debug isis update-packets
debug isis spf-events
debug isis route-events
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:e::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
! IS-IS distributes the local SRv6 locator (2001:db8:e::/48) as an
! IPv6 reachability TLV across the SR underlay.  gw1 receives it and
! installs a route to pe1's locator via the SR-domain veth, replacing
! the static `ipv6 route 2001:db8:e::/48 ... onlink` the static-route
! variant of this test uses.  Mirrors a real-world deployment where
! IGP carries the SR underlay and BGP-MUP just rides on top.
interface lo
 ip router isis 1
 ipv6 router isis 1
 isis passive
exit
!
interface veth-pe-sr
 ip router isis 1
 ipv6 router isis 1
 isis network point-to-point
 isis circuit-type level-2-only
 isis hello-interval 1
 isis hello-multiplier 3
exit
!
router isis 1
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 metric-style wide
 segment-routing srv6
  locator default
 exit
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::1 remote-as 65002
 neighbor 2001:db8:0::2 remote-as 65000
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::1 activate
  neighbor 2001:db8:1::1 route-map MUP_PERMIT in
  neighbor 2001:db8:1::1 route-map MUP_PERMIT out
  neighbor 2001:db8:0::2 activate
  neighbor 2001:db8:0::2 route-map MUP_PERMIT in
  neighbor 2001:db8:0::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for vrf-red — End.DT4 decapsulates into
! vrf-red's table per RFC 8986 §4.7, so the DSD origination lives
! here.  Same pattern as L3VPN: the per-vrf instance owns the
! data-plane SID, the default-vrf instance owns the BGP-MUP session.
router bgp 65001 vrf vrf-red
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  ! pe1 imports the DL-direction RT (carried on ISD from gw1 and on
  ! T1ST from the MUP-Controller).  T1ST resolves against the cached
  ! ISD and installs an H.Encaps toward gw1's End.M.GTP4.E SID.
  route-target import 10:10
  ! pe1 originates DSD on the UL-direction RT so only gw1 imports it.
  segment direct 10.0.0.250 rd 100:100 rt 20:20 mup 10:10 behavior dt4
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
