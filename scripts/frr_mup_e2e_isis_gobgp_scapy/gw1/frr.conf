hostname gw1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
debug isis adj-packets
debug isis update-packets
debug isis spf-events
debug isis route-events
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:f::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
! IS-IS distributes the local SRv6 locator (2001:db8:f::/48) as an
! IPv6 reachability TLV; pe1 receives it and installs a route to
! gw1's locator via the SR-domain veth, replacing the static
! `ipv6 route 2001:db8:f::/48 ... onlink` the static-route variant
! of this test uses.
interface lo
 ip router isis 1
 ipv6 router isis 1
 isis passive
exit
!
interface veth-gw-sr
 ip router isis 1
 ipv6 router isis 1
 isis network point-to-point
 isis circuit-type level-2-only
 isis hello-interval 1
 isis hello-multiplier 3
exit
!
router isis 1
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 metric-style wide
 redistribute ipv6 connected level-2
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for vrf-red — owns the local `segment interwork`
! that originates ISD for the slice.  T1ST received over the default-
! vrf MUP session above resolves against this ISD and installs into
! vrf-red's table.
router bgp 65002 vrf vrf-red
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  segment interwork 10.99.0.0/24 rd 200:200 rt 10:10
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
