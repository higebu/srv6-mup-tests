hostname pe1
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for slice1 — owns the data-plane SIDs for
! slice1 (`segment` originations).  The default-vrf instance above
! carries the BGP-MUP session and re-advertises everything to pe2.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  segment interwork 10.99.0.0/24 rd 100:100 rt 65001:1
  segment direct 10.0.0.250 rd 100:100 rt 65001:1 mup 65001:10 behavior dt4
 exit-address-family
 !
 address-family ipv6 mup
  segment interwork 2001:db8:99::/64 rd 200:200 rt 65001:2
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
