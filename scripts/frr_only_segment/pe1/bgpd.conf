hostname pe1
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for slice1 — owns ISD origination for slice1
! (v4 + v6).  In the SAFI_MUP schema `segment interwork` and
! `segment direct` are mutually exclusive within a single (vrf, AFI)
! policy, so DSD origination has been split out into slice2 below.
! The default-vrf instance carries the BGP-MUP session and
! re-advertises everything to pe2.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 ! `network` advertises marker prefixes that don't exist in slice1's
 ! kernel FIB; disable import-check so BGP doesn't require them to be
 ! reachable.
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  network 10.99.0.0/24
  rd 100:100
  rt export 65001:1
  sid auto
  segment interwork
 exit-address-family
 !
 address-family ipv6 mup
  network 2001:db8:99::/64
  rd 200:200
  rt export 65001:2
  sid auto
  segment interwork
 exit-address-family
exit
!
! Per-vrf bgp instance for slice2 — owns DSD origination for slice2
! on ipv4.  Split out from slice1 because `segment <interwork|direct>`
! is mutually exclusive per (vrf, AFI) under SAFI_MUP.
router bgp 65001 vrf slice2
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  rd 100:200
  rt export 65001:10
  sid auto
  segment direct
   address 10.0.0.250
   behavior dt4
   segment-id 65001:10
  exit
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
