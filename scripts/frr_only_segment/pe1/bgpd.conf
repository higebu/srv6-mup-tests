hostname pe1
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for slice1 — owns the data-plane SIDs for
! slice1.  ISD origination is driven from the per-vrf unicast RIB via
! `rd|rt|sid mup export`; DSD origination uses the dedicated `segment
! direct` keyword under the mup AF.  The default-vrf instance above
! carries the BGP-MUP session and re-advertises everything to pe2.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 ! `network` advertises marker prefixes that don't exist in slice1's
 ! kernel FIB; disable import-check so BGP doesn't require them to be
 ! reachable.
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 unicast
  network 10.99.0.0/24
  rd mup export 100:100
  rt mup export 65001:1
  sid mup export auto
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:99::/64
  rd mup export 200:200
  rt mup export 65001:2
  sid mup export auto
 exit-address-family
 !
 address-family ipv4 mup
  segment direct 10.0.0.250 rd 100:100 rt 65001:1 mup 65001:10 behavior dt4
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
