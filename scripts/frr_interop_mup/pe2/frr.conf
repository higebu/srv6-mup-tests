hostname pe2
log file /tmp/pe2/frr.log
debug zebra kernel
debug zebra rib detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
no zebra nexthop kernel enable
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:2c::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::1 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::1 activate
  neighbor 2001:db8:2::1 route-map MUP_PERMIT in
  neighbor 2001:db8:2::1 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::1 activate
  neighbor 2001:db8:2::1 route-map MUP_PERMIT in
  neighbor 2001:db8:2::1 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for slice1 — same role as pe1: opt vrf slice1
! into RT 10:10 / 20:20 imports so received T1ST/T2ST resolve and
! install seg6local routes locally.  Marker prefixes use RFC 5737
! documentation ranges to avoid overlapping the gNB-side ISD prefix
! (which would trip the bgp_mup_isd_is_self loop guard); a unique
! /24 per PE keeps the two markers distinguishable in `show bgp`.
router bgp 65002 vrf slice1
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 ! `network` advertises marker prefixes that don't exist in slice1's
 ! kernel FIB; disable import-check so BGP doesn't require them to be
 ! reachable.
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 unicast
  network 198.51.100.0/24
  rd mup export 65002:1
  rt mup export 10:10
  ! Pin explicit SIDs per AFI to sidestep an `auto`-allocator timing
  ! race that occasionally returns the same SID for v4 and v6 ISD.
  sid mup export explicit 2001:db8:2c:100::
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:beef::/64
  rd mup export 65002:2
  rt mup export 20:20
  sid mup export explicit 2001:db8:2c:200::
 exit-address-family
 !
 address-family ipv4 mup
  route-target import 10:10
 exit-address-family
 !
 address-family ipv6 mup
  route-target import 20:20
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
