hostname pe1
log file /tmp/pe1/frr.log
debug zebra kernel msgdump send
debug zebra kernel
debug zebra dplane detailed
debug zebra rib detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
! Disable use of the kernel nexthop API for installs.  The kernel
! NEXTHOP_OBJ subsystem rejects nexthops that carry an LWT encap
! (RTM_NEWNEXTHOP returns -EINVAL "Nexthop id does not exist"), but the
! seg6local install needs encap.  Falling back to per-route inline
! nexthops sidesteps the limitation.
no zebra nexthop kernel enable
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:1c::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65000
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! Per-vrf bgp instance for slice1 — opts vrf slice1 into the RT 10:10
! (v4) and RT 20:20 (v6) imports so received T1ST/T2ST routes resolve
! against this instance's segment-origin cache and install seg6local /
! H.Encaps state into vrf slice1's table.  pe1 is a destination PE,
! not the gNB-side originator, so the marker prefixes use RFC 5737
! documentation ranges that do NOT overlap the gNB-side ISD prefix
! (10.99.0.0/24 / 2001:db8:99::/64) gobgpd advertises — otherwise
! bgp_mup_isd_is_self would trip the "T1ST endpoint matches self-
! originated ISD; skip install" loop guard on every received T1ST.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  segment interwork 192.0.2.0/24 rd 65001:1 rt 10:10
 exit-address-family
 !
 address-family ipv6 mup
  segment interwork 2001:db8:dead::/64 rd 65001:2 rt 20:20
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
