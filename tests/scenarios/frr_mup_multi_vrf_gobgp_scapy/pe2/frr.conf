hostname pe2
log file /tmp/pe2/frr.log
debug zebra kernel
debug zebra rib detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
no zebra nexthop kernel enable
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:2c::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::1 remote-as 65001
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::1 activate
  neighbor 2001:db8:2::1 route-map MUP_PERMIT in
  neighbor 2001:db8:2::1 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::1 activate
  neighbor 2001:db8:2::1 route-map MUP_PERMIT in
  neighbor 2001:db8:2::1 route-map MUP_PERMIT out
 exit-address-family
exit
!
! vrf-red — RT 10:10 importer.  Set A (RT 10:10) and Set C
! (RT 10:10 + 20:20) must install into vrf-red's table; Set B
! (RT 20:20 only) and Set D (RT 99:99) must NOT install here.
router bgp 65002 vrf vrf-red
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  network 198.51.100.0/24
  rd 65002:10
  rt both 10:10
  sid explicit 2001:db8:2c:a10::
  segment interwork
 exit-address-family
 !
 address-family ipv6 mup
  network 2001:db8:beef:10::/64
  rd 65002:11
  rt both 10:10
  sid explicit 2001:db8:2c:b10::
  segment interwork
 exit-address-family
exit
!
! vrf-blue — RT 20:20 importer.  Set B (RT 20:20) and Set C
! (RT 10:10 + 20:20) must install into vrf-blue's table; Set A
! (RT 10:10 only) and Set D (RT 99:99) must NOT install here.
router bgp 65002 vrf vrf-blue
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  network 198.51.100.128/25
  rd 65002:20
  rt both 20:20
  sid explicit 2001:db8:2c:a20::
  segment interwork
 exit-address-family
 !
 address-family ipv6 mup
  network 2001:db8:beef:20::/64
  rd 65002:21
  rt both 20:20
  sid explicit 2001:db8:2c:b20::
  segment interwork
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
