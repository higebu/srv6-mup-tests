hostname pe1
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:2::2 remote-as 65002
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
 !
 address-family ipv6 mup
  neighbor 2001:db8:2::2 activate
  neighbor 2001:db8:2::2 route-map MUP_PERMIT in
  neighbor 2001:db8:2::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! slice1 carries ISD origination (v4 + v6).  segment <interwork|direct>
! is mutually exclusive within a single (vrf, AFI) policy under
! SAFI_MUP, so DSD origination is split out to slice2 below.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  network 10.99.0.0/24
  rd 100:100
  rt export 65001:1
  sid auto
  segment interwork
 exit-address-family
 !
 address-family ipv6 mup
  network 2001:db8:99::/64
  rd 200:200
  rt export 65001:2
  sid auto
  segment interwork
 exit-address-family
exit
!
! slice2 carries DSD origination (v4) — exclusive of slice1's ISD.
router bgp 65001 vrf slice2
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  rd 100:200
  rt export 65001:10
  sid auto
  segment direct
   address 10.0.0.250
   behavior dt4
   segment-id 65001:10
  exit
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
