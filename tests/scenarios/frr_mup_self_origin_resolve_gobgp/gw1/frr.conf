hostname gw1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp zebra
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:f::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::2 remote-as 65000
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::2 activate
  neighbor 2001:db8:1::2 route-map MUP_PERMIT in
  neighbor 2001:db8:1::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
! vrf-red — N3 VRF.  Originates the ISD for the gNB-side prefix and
! exports it with rt 10:10.  Import side is intentionally empty: the
! T1ST received from gobgpd carries the same rt 10:10, but T1ST
! installs belong on the N6 side, so vrf-red must not import it.
router bgp 65001 vrf vrf-red
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  network 10.99.0.0/24
  rd 65001:10
  rt export 10:10
  sid auto
  segment interwork
 exit-address-family
exit
!
! vrf-blue — N6 VRF on the same node.  No local origination; only
! imports.  T1ST sent by gobgpd carries rt 10:10 so it lands here
! and resolves against vrf-red's locally-originated ISD (cached in
! the default-vrf MUP discovery table at origination time).
router bgp 65001 vrf vrf-blue
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  rd 65001:20
  rt import 10:10
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
