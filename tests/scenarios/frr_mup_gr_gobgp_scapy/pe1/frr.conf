hostname pe1
debug zebra kernel
debug zebra rib detailed
debug zebra dplane detailed
debug bgp neighbor-events
debug bgp updates
debug bgp graceful-restart
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:e::/48 block-len 24 node-len 24 func-bits 8
   exit
  exit
 exit
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 ! Graceful Restart (RFC 4724) toggled at runtime by the harness via
 ! `[no] bgp graceful-restart` so sub-tests A/B (GR on) and C (GR off)
 ! share the same starting config.  Default here is "on".
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart restart-time 120
 ! `clear bgp *` defaults to a Cease/Hard-Reset notification (RFC 8538
 ! Section 4 "Hard Reset") because FRR's DFLT_BGP_HARD_ADMIN_RESET is
 ! enabled by default since version 8.3 (bgpd/bgp_vty.c:113-116).  A
 ! hard reset bypasses the GR helper window: PEER_STATUS_NSF_WAIT is
 ! never set in bgp_notify_send_internal (bgpd/bgp_packet.c:1076), so
 ! bgp_stop wipes peer->nsf[afi][safi] (bgpd/bgp_fsm.c:2166) and the
 ! stale-route preservation in bgp_clear_route_node never fires
 ! (bgpd/bgp_route.c:7121).  Disable hard-admin-reset so sub-test A's
 ! `clear bgp *` becomes a graceful Cease/Administrative Reset that
 ! triggers helper preservation.  Mirrors tests/topotests/
 ! bgp_gr_notification/r2/bgpd.conf.
 no bgp hard-administrative-reset
 neighbor 2001:db8:1::1 remote-as 65002
 neighbor 2001:db8:0::2 remote-as 65000
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  neighbor 2001:db8:1::1 activate
  neighbor 2001:db8:1::1 route-map MUP_PERMIT in
  neighbor 2001:db8:1::1 route-map MUP_PERMIT out
  neighbor 2001:db8:0::2 activate
  neighbor 2001:db8:0::2 route-map MUP_PERMIT in
  neighbor 2001:db8:0::2 route-map MUP_PERMIT out
 exit-address-family
exit
!
router bgp 65001 vrf vrf-red
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
  rt import 10:10
  rd 100:100
  rt export 20:20
  sid auto
  segment direct
   address 10.0.0.250
   behavior dt4
   segment-id 10:10
  exit
 exit-address-family
exit
!
route-map MUP_PERMIT permit 10
exit
!
