hostname pe1
log file /tmp/pe1/frr.log
!
no zebra nexthop kernel enable
!
segment-routing
 srv6
  locators
   locator default
    prefix 2001:db8:e::/64 block-len 40 node-len 24 func-bits 16
   exit
   locator alt
    prefix 2001:db8:f::/64 block-len 40 node-len 24 func-bits 16
   exit
  exit
 exit
exit
!
! Default-vrf BGP instance.  Activates the MUP AF on no peer (the
! property tests don't need a session — they only exercise the vtysh
! surface), but the AF must exist so default-vrf MUP commands actually
! reach bgp_mup_export_check_ctx and trip the non-default-vrf guard
! instead of dying at the lexer.
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
 exit-address-family
 !
 address-family ipv6 mup
 exit-address-family
exit
!
! Two non-default-vrf BGP instances for property exercises.  Tests
! mutate the MUP AF inside slice1; slice2 exists so a property that
! wants a second VRF in scope (e.g. multi-vrf RT split) has one
! without bringing up another router.  _baseline_mup_clean re-creates
! both from this same skeleton between examples.
router bgp 65001 vrf slice1
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 segment-routing srv6
  locator default
 exit
 !
 address-family ipv4 mup
 exit-address-family
 !
 address-family ipv6 mup
 exit-address-family
exit
!
router bgp 65001 vrf slice2
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 address-family ipv4 mup
 exit-address-family
 !
 address-family ipv6 mup
 exit-address-family
exit
!
